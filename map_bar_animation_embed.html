    function renderMap(geoJson) {
        echarts.registerMap('china', geoJson);

        var option = {
            baseOption: {
                timeline: {
                    axisType: 'category',
                    autoPlay: true,
                    playInterval: 1800,
                    loop: true,
                    data: years,
                    left: '3%',
                    right: '3%',
                    bottom: 0,
                    label: { fontSize: 13, color: '#ccc' },
                    lineStyle: { color: 'rgba(255,255,255,0.3)' },
                    checkpointStyle: {
                        color: '#FF6B6B',
                        borderColor: '#FF6B6B',
                        borderWidth: 2,
                        shadowBlur: 8,
                        shadowColor: '#FF6B6B'
                    },
                    controlStyle: {
                        color: '#FF6B6B',
                        borderColor: '#FF6B6B',
                        borderWidth: 1.5
                    },
                    itemStyle: { color: '#aaa' },
                    emphasis: {
                        itemStyle: { color: '#fff' },
                        label: { fontSize: 15, color: '#fff' }
                    }
                },
                geo: {
                    map: 'china',
                    roam: false,
                    center: [104.5, 36.5],
                    zoom: 1.25,
                    aspectScale: 0.85,
                    itemStyle: {
                        areaColor: '#1e3a5f',
                        borderColor: 'rgba(100, 180, 255, 0.4)',
                        borderWidth: 0.8,
                        shadowBlur: 15,
                        shadowColor: 'rgba(0, 150, 255, 0.2)'
                    },
                    emphasis: {
                        label: { show: true, color: '#fff', fontSize: 12 },
                        itemStyle: {
                            areaColor: '#2a5080',
                            borderColor: '#64b5f6',
                            borderWidth: 1.5
                        }
                    }
                },
                series: [{
                    type: 'custom',
                    coordinateSystem: 'geo',
                    renderItem: function(params, api) {
                        var lon = api.value(0);
                        var lat = api.value(1);
                        var value = api.value(2);
                        var color = api.value(3);
                        if (lon == null || lat == null) return null;
                        var point = api.coord([lon, lat]);
                        if (!point) return null;

                        var maxBarHeight = 90;
                        var barHeight = value > 0 ? Math.max((value / globalMax) * maxBarHeight, 6) : 0;
                        var barWidth = 11;
                        var radius = 4;
                        var children = [];

                        children.push({
                            type: 'circle',
                            shape: { cx: point[0], cy: point[1], r: radius },
                            style: { fill: color, stroke: '#fff', lineWidth: 1.5 }
                        });

                        if (value > 0) {
                            children.push({
                                type: 'rect',
                                shape: { x: point[0] - barWidth / 2, y: point[1] - barHeight - radius, width: barWidth, height: barHeight },
                                style: { fill: color, stroke: '#fff', lineWidth: 0.5, shadowBlur: 6, shadowColor: 'rgba(0,0,0,0.3)' }
                            });
                            children.push({
                                type: 'text',
                                style: { text: value.toString(), x: point[0], y: point[1] - barHeight - radius - 4, textAlign: 'center', textVerticalAlign: 'bottom', fill: '#fff', font: 'bold 11px "Microsoft YaHei", sans-serif', textShadowColor: 'rgba(0,0,0,0.6)', textShadowBlur: 3 }

                        }

                        children.push({
                            type: 'text',

                }]

                        })
                    }]
                };
            })
        };
