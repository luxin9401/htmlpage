                        var color = api.value(3);
                        if (lon == null || lat == null) return null;
                        var point = api.coord([lon, lat]);
                        if (!point) return null;
                        var maxBarHeight = 90;
                        var barHeight = value > 0 ? Math.max((value / globalMax) * maxBarHeight, 6) : 0;

                        var radius = 4;
                        var children = [];
                        children.push({
